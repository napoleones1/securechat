name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'SecureChatMinimal/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: 📦 Install dependencies
        working-directory: SecureChatMinimal
        run: npm install

      - name: 🏗 Setup EAS
        run: npm install -g eas-cli

      - name: 🔐 Login to Expo
        run: |
          echo "${{ secrets.EXPO_TOKEN }}" | eas login --token-stdin

      - name: 🚀 Build APK
        working-directory: SecureChatMinimal
        run: eas build --platform android --profile preview --non-interactive

      - name: 📱 Get APK URL
        working-directory: SecureChatMinimal
        run: |
          echo "APK built successfully!"
          echo "Download from EAS Build dashboard"
